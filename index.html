<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1e1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="kandartologi" />
  <title>kandartologi — Nasi Kandar catalog</title>
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>kandartologi</h1>
    <p class="tagline">POC: catat gerai Nasi Kandar yang anda cuba — data dalam telefon sahaja (macam mechaok)</p>
  </header>

  <nav class="nav-tabs" role="tablist" aria-label="Main">
    <button type="button" class="tab active" role="tab" aria-selected="true" data-panel="catalog">Katalog</button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-panel="map">Peta</button>
    <button type="button" class="tab" role="tab" aria-selected="false" data-panel="share">Kongsi &amp; orang lain</button>
  </nav>

  <main class="main">
    <section id="panel-catalog" class="panel" role="tabpanel">
      <div class="card">
        <h2 class="card-title">Tambah lawatan</h2>
        <form id="form-entry" class="form-grid">
          <label>Nama gerai / restoran
            <input type="text" name="stallName" required maxlength="120" placeholder="Contoh: Nasi Kandar Line Clear" />
          </label>
          <label>Kawasan / bandar
            <input type="text" name="area" required maxlength="80" placeholder="Contoh: George Town" />
          </label>
          <label class="span-2">Hidangan yang dicuba
            <input type="text" name="dishes" maxlength="300" placeholder="Ayam goreng, kuah campur…" />
          </label>
          
          <div class="form-grid span-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 0;">
            <label>Rating Keseluruhan
              <select name="rating" required>
                <option value="5">5 — Power</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
              </select>
            </label>
            <label>Skill Joki (Mixing)
              <select name="jokiRating">
                <option value="5">⭐⭐⭐⭐⭐ (Sifu)</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐ (Amatur)</option>
              </select>
            </label>
          </div>

          <label class="span-2" style="margin-top: 10px;">
            Tahap Banjir: <span id="banjir-label" style="font-weight: bold; color: #d32f2f;">Standard</span>
            <input type="range" name="banjir" id="banjir-slider" min="1" max="5" value="3" step="1" style="width: 100%; margin-top: 8px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: #666;">
              <span>Kering</span>
              <span>Sikit</span>
              <span>Standard</span>
              <span>Banjir</span>
              <span>Tsunami</span>
            </div>
          </label>

          <label>Tarikh lawatan
            <input type="date" name="visited" required />
          </label>
          <label class="span-2">Nota
            <textarea name="notes" rows="2" maxlength="800" placeholder="Perasaan, queue, parking…"></textarea>
          </label>
          <div class="loc-row span-2">
            <label class="coord">Lat (pilihan)
              <input type="number" name="lat" step="any" placeholder="5.41" />
            </label>
            <label class="coord">Lng (pilihan)
              <input type="number" name="lng" step="any" placeholder="100.33" />
            </label>
            <button type="button" id="btn-geo" class="btn-ghost">Ambil lokasi</button>
          </div>
          <div class="form-actions span
